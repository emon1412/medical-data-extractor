server {
  listen       ${PORT};
  server_name  _;
  root         /usr/share/nginx/html;
  index        index.html;

  # nginx:alpine's default mime.types doesn't map .mjs, which makes the browser
  # reject dynamically-imported ES modules (e.g. pdfjs-dist's worker) because
  # they come back as application/octet-stream. Re-include the defaults and
  # add .mjs on top — a bare `types {}` block would otherwise REPLACE the
  # entire MIME map and break index.html, css, png, etc.
  include       /etc/nginx/mime.types;
  types {
    application/javascript  mjs;
  }
  default_type  application/octet-stream;

  # Match the backend's MAX_UPLOAD_SIZE_MB. nginx defaults to 1m, which
  # would reject any reasonably-sized scanned PDF with a 413 before the
  # request ever reached the backend.
  client_max_body_size 25m;

  # Proxy API calls to the backend Cloud Run service so the frontend can keep
  # using same-origin relative URLs (no CORS, no build-time secrets needed).
  location /api/ {
    resolver 8.8.8.8 valid=300s ipv6=off;
    proxy_pass         ${BACKEND_URL}$request_uri;
    proxy_http_version 1.1;
    proxy_set_header   Host              ${BACKEND_HOST};
    proxy_set_header   X-API-Key         ${API_KEY};
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto https;
    proxy_ssl_server_name on;
    proxy_ssl_name        ${BACKEND_HOST};
  }

  # SPA routing: fall back to index.html
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Cache hashed assets aggressively
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
}
