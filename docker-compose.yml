services:
  postgres:
    image: postgres:16-alpine
    container_name: hde-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: hde
      POSTGRES_PASSWORD: hde
      POSTGRES_DB: medical_data
    ports:
      - "5434:5432"
    volumes:
      - hde_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hde -d medical_data"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Optional: a lightweight web UI for poking at the DB.
  # Browse to http://localhost:8081 and connect with system=postgres, server=postgres,
  # user=hde, password=hde, database=medical_data.
  adminer:
    image: adminer:latest
    container_name: hde-adminer
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8081:8080"
    profiles: ["ui"]

volumes:
  hde_pgdata:
